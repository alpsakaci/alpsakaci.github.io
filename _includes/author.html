<div class="author">
  <img
    class="author-avatar"
    src="{{ site.author.avatar }}"
    alt="{{ site.author.username }}"
  />
  <h2 class="author-name">{{ site.author.name }}</h2>
  <p class="author-bio">{{ site.author.bio }}</p>
  <div class="custom-links">
    {% for social in site.social %}
      {% if social.url %}
          <a class="icon-{{ social.icon }}" style="text-decoration: none;" href="{{ social.url }}" target="_blank" {% if social.desc %} title="{{ social.desc }}"{% endif %}">
            <i class="fa fa-{{ social.icon }}"></i>
          </a>
          {% if social != site.social.last %}
            &nbsp;&nbsp;·&nbsp;&nbsp;
          {% endif %}
      {% endif %}
    {% endfor %}
  </div>
</div>
